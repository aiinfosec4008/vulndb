site_name: 中央研究院資安弱點知識庫
site_url: https://aiinfosec4008.github.io/vulndb/
site_description: 中央研究院資安科弱點管理知識庫，供各所 IT 管理員參考
site_author: 中央研究院資安科

repo_url: https://github.com/aiinfosec4008/vulndb
repo_name: aiinfosec4008/vulndb
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  palette:
    - scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: 切換為亮色模式
    - scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-night
        name: 切換為暗色模式
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.action.edit
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: zh

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - def_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - 首頁: index.md
  - 弱點百科 (CVE):
    - cve/index.md
    - Web 類: cve/web/index.md
    - 系統類: cve/system/index.md
    - 服務類: cve/services/index.md
  - 攻擊手法 (TTPs): ttps/index.md
  - 資安政策與規範: policy/index.md
